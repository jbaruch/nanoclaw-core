name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Skill review — status
        run: tessl skill review --threshold 85 skills/status/SKILL.md

      - name: Skill review — query-history
        run: tessl skill review --threshold 85 skills/query-history/SKILL.md

      - name: Lint tile
        run: tessl tile lint .

      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
